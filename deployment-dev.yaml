apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-dev
  template:
    metadata:
      labels:
        app: nginx-dev
    spec:
      containers:
      - name: nginx
        image: cithit/roger142:latest
        ports:
        - containerPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dev-ingress
spec:
  rules:
  - host:
    http:
      paths:
      - path: /
        pathType: ImplementationSpecific
        backend:
          service:
            name: dev-service
            port:
              number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: dev-service
spec:
  selector:
    app: nginx-dev
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
